app = "dev-stpotter-dumb-embed"
primary_region = "iad"

[env]
  FASTEMBED_CACHE_PATH = "/app/models"
  MODEL_NAME = "sentence-transformers/all-MiniLM-L6-v2"

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2

[checks]
  [checks.health]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 8080
    timeout = "10s"
    type = "http"
